<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>現場管理システム ｜ 案件管理</title>
<style>
:root{
  --bg:#eef0f3;--surface:#fff;--ink:#1e293b;--ink2:#475569;--muted:#94a3b8;
  --line:#e2e8f0;--line2:#f1f5f9;--accent:#059669;--accent-bg:#ecfdf5;--accent-line:#a7f3d0;
  --slate900:#0f172a;--slate800:#1e293b;--field-label:#f3f4f6;
  --r:10px;--font:"Hiragino Kaku Gothic ProN","Yu Gothic","YuGothic","Meiryo",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
.app{display:flex;min-height:100vh}
.sidebar{width:208px;background:var(--slate900);color:#cbd5e1;display:flex;flex-direction:column;flex-shrink:0}
.brand{display:flex;align-items:center;gap:8px;padding:16px;border-bottom:1px solid #1e293b}
.brand .logo{width:32px;height:32px;border-radius:8px;background:#fbbf24;display:flex;align-items:center;justify-content:center;color:#0f172a;font-weight:700}
.brand .tt{font-size:14px;font-weight:700;color:#fff;line-height:1.2}
.brand .ss{font-size:10px;color:#64748b}
.nav{padding:8px;display:flex;flex-direction:column;gap:2px}
.side-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;color:#94a3b8;border:none;background:none;text-align:left;width:100%}
.side-item.active{background:#1e293b;color:#fff}
.side-item.soon{opacity:.5}
.side-item .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.6}
.side-item .tag{margin-left:auto;font-size:9px;background:#334155;color:#94a3b8;padding:1px 6px;border-radius:8px}
.side-foot{margin-top:auto;padding:12px;border-top:1px solid #1e293b;display:flex;align-items:center;gap:8px;font-size:12px;color:#94a3b8}
.avatar{width:28px;height:28px;border-radius:50%;background:#334155;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:16px;font-weight:700;margin:0}
.crumb{font-size:12px;color:var(--muted)}
.crumb b{color:var(--ink2);font-weight:500}
.crumb a{color:var(--accent);cursor:pointer;text-decoration:none}
.content{padding:20px;flex:1}
.content.narrow{max-width:960px}
/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:14px}
.tab{padding:8px 16px;font-size:14px;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.search{display:flex;align-items:center;gap:8px;background:#f1f5f9;border-radius:8px;padding:7px 12px;width:260px}
.search input{border:none;background:none;outline:none;font-size:14px;width:100%;font-family:inherit}
.spacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:7px 14px;border-radius:8px;border:1px solid transparent}
.btn-excel{color:#047857;background:var(--accent-bg);border-color:var(--accent-line)}
.btn-excel:hover{background:#d1fae5}
.btn-primary{color:#fff;background:var(--slate800);border:none}
.btn-primary:hover{background:#334155}
.btn-ghost{color:var(--ink2);background:var(--surface);border-color:var(--line)}
.btn-ghost:hover{background:#f1f5f9}
.btn-lg{font-size:14px;padding:9px 20px}
.btn-save{color:#fff;background:var(--accent);border:none}
.btn-save:hover{background:#047857}
.btn:disabled{opacity:.4;cursor:not-allowed}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.tablewrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap}
th{text-align:left;font-weight:500;color:var(--muted);font-size:12px;padding:9px 14px;border-bottom:1px solid var(--line);background:#fafbfc}
td{padding:10px 14px;border-bottom:1px solid var(--line2);color:var(--ink2)}
tr:last-child td{border-bottom:none}
td.name{font-weight:600;color:var(--ink);max-width:280px;overflow:hidden;text-overflow:ellipsis}
td.num{text-align:right;font-variant-numeric:tabular-nums;color:var(--ink)}
td.memo{max-width:200px;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
.count{font-size:12px;color:var(--muted);padding:10px 14px}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;white-space:nowrap}
.b-sky{background:#e0f2fe;color:#0369a1}.b-amber{background:#fef3c7;color:#b45309}.b-emerald{background:#d1fae5;color:#047857}
.b-violet{background:#ede9fe;color:#6d28d9}.b-blue{background:#dbeafe;color:#1d4ed8}.b-slate{background:#e2e8f0;color:#475569}.b-rose{background:#ffe4e6;color:#be123c}
.new-flag{margin-left:8px;font-size:10px;background:#dcfce7;color:#15803d;padding:1px 6px;border-radius:6px}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50}
.modal{background:#fff;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,.25);width:100%;max-width:560px;max-height:88vh;display:flex;flex-direction:column}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--line)}
.modal-head h3{margin:0;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.x{border:none;background:none;color:var(--muted);font-size:20px;line-height:1;padding:4px 8px;border-radius:8px}
.x:hover{background:#f1f5f9}
.modal-body{padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:20px}
.sec-title{font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:8px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.facets{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.facet h5{margin:0 0 6px;font-size:11px;font-weight:400;color:var(--muted)}
.chk{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink2);padding:2px 0;cursor:pointer;user-select:none;white-space:nowrap}
.chk input{width:15px;height:15px;accent-color:var(--accent);flex-shrink:0}
.chk.trunc{max-width:160px}.chk.trunc span{overflow:hidden;text-overflow:ellipsis}
.col-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px 10px}
.link{font-size:12px;color:var(--accent);background:none;border:none;padding:0}.link.gray{color:var(--muted)}.link:hover{text-decoration:underline}
.opts{display:flex;flex-wrap:wrap;align-items:flex-end;gap:24px}
.seg{display:flex;gap:14px}
.radio{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}.radio input{accent-color:var(--accent)}
.modal-foot{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--line)}
.foot-info{font-size:12px;color:var(--ink2)}.foot-info b{color:var(--ink)}
.warn{color:#e11d48;margin-left:8px}
.foot-btns{display:flex;gap:8px}
/* form */
.seg2{display:inline-flex;background:#f1f5f9;border-radius:8px;padding:3px;margin-bottom:16px}
.seg2 button{border:none;background:none;padding:6px 18px;border-radius:6px;font-size:13px;color:var(--ink2);font-weight:500}
.seg2 button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.card-h{padding:11px 16px;border-bottom:1px solid var(--line);font-size:13px;font-weight:600;color:var(--ink2);background:#fafbfc}
.form{padding:4px 0}
.frow{display:grid;grid-template-columns:160px 1fr;border-bottom:1px solid var(--line2)}
.frow:last-child{border-bottom:none}
.lab{background:var(--field-label);padding:12px 14px;font-size:13px;color:var(--ink2);display:flex;align-items:center;gap:6px}
.req{font-size:10px;background:#fecaca;color:#b91c1c;padding:1px 5px;border-radius:4px}
.optf{font-size:10px;background:#e2e8f0;color:#64748b;padding:1px 5px;border-radius:4px}
.fld{padding:9px 14px;display:flex;flex-direction:column;gap:6px;justify-content:center}
.ctrl{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;outline:none;background:#fff}
.ctrl:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
textarea.ctrl{resize:vertical;min-height:64px}
.half{max-width:280px}.short{max-width:160px}
.range{display:flex;align-items:center;gap:8px}.range span{color:var(--muted);font-size:12px}
.radios{display:flex;gap:14px;flex-wrap:wrap}
.radio-b{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;padding:6px 10px;border:1px solid var(--line);border-radius:7px}
.radio-b.sel{border-color:var(--accent);background:var(--accent-bg)}
.radio-b input{accent-color:var(--accent)}
.check{display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer}.check input{width:16px;height:16px;accent-color:var(--accent)}
.hint{font-size:11px;color:var(--muted)}
.suffix{display:flex;align-items:center;gap:8px}.suffix .u{font-size:12px;color:var(--muted);white-space:nowrap}
.cal-note{font-size:12px;color:var(--ink2);padding:12px 16px;background:#f8fafc;border-top:1px dashed var(--line);display:flex;align-items:center;gap:8px}
.foot-r{display:flex;justify-content:flex-end;gap:10px;padding-top:4px}
</style>
</head>

/* ===== Excel生成（裸の表：条件設定つき） ===== */
function exportExcel({data,cols,unit,totalRow,sheet,file}){
  const tag=(c)=>c.money?(unit==="man"?"（万円）":"（円）"):"";
  const header=cols.map(c=>c.label+tag(c));
  const cell=(r,c)=>{if(!c.money)return r[c.key]||"";const n=Number(r[c.key]||0);return unit==="man"?Math.round(n/10000):n;};
  const aoa=[header,...data.map(r=>cols.map(c=>cell(r,c)))];
  if(totalRow)aoa.push(cols.map((c,i)=>c.money?data.reduce((a,r)=>a+(unit==="man"?Math.round(Number(r[c.key]||0)/10000):Number(r[c.key]||0)),0):(i===0?"合計":"")));
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws["!cols"]=cols.map(c=>({wch:c.key==="name"?34:c.key==="memo"?30:["client","vendor","supplier"].includes(c.key)?20:c.money?14:12}));
  const range=XLSX.utils.decode_range(ws["!ref"]);
  cols.forEach((c,ci)=>{if(!c.money)return;for(let ri=1;ri<=range.e.r;ri++){const a=XLSX.utils.encode_cell({r:ri,c:ci});if(ws[a]&&typeof ws[a].v==="number")ws[a].z="#,##0";}});
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,sheet);
  const d=new Date();const ymd=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
  XLSX.writeFile(wb,`${file}_${ymd}.xlsx`);
}

function ExportModal({fmt,data,onClose}){
  const cfg=META[fmt];
  const [unit,setUnit]=useState("yen");
  const [totalRow,setTotalRow]=useState(false);
  const [colKeys,setColKeys]=useState(cfg.cols.map(c=>c.key));
  const [sel,setSel]=useState(()=>{const o={};cfg.facets.forEach(f=>{o[f]=Object.fromEntries(uniq(data,f).map(v=>[v,true]));});return o;});
  const rows=useMemo(()=>data.filter(r=>cfg.facets.every(f=>sel[f][r[f]||EMPTY])),[sel,data]);
  const outCols=cfg.cols.filter(c=>colKeys.includes(c.key));
  const toggleCol=(k)=>setColKeys(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]);
  const toggleFacet=(f,v)=>setSel(p=>({...p,[f]:{...p[f],[v]:!p[f][v]}}));
  const run=()=>{if(!rows.length||!outCols.length)return;exportExcel({data:rows,cols:outCols,unit,totalRow,sheet:cfg.sheet,file:cfg.file});onClose();};
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h3>📊 Excel出力（{cfg.label}）— 条件設定</h3><button className="x" onClick={onClose}>×</button></div>
        <div className="modal-body">
          <section>
            <div className="sec-title">出力対象の絞り込み</div>
            <div className="facets">
              {cfg.facets.map(f=>(
                <div className="facet" key={f}><h5>{FACET_LABEL[f]}</h5>
                  {uniq(data,f).map(v=>(<label className="chk trunc" key={v}><input type="checkbox" checked={!!sel[f][v]} onChange={()=>toggleFacet(f,v)} /><span>{v}</span></label>))}
                </div>
              ))}
            </div>
          </section>
          <section>
            <div className="sec-head"><div className="sec-title" style={{margin:0}}>出力する列</div>
              <div style={{display:"flex",gap:12}}><button className="link" onClick={()=>setColKeys(cfg.cols.map(c=>c.key))}>全選択</button><button className="link gray" onClick={()=>setColKeys([])}>全解除</button></div>
            </div>
            <div className="col-grid">{cfg.cols.map(c=>(<label className="chk" key={c.key}><input type="checkbox" checked={colKeys.includes(c.key)} onChange={()=>toggleCol(c.key)} /><span>{c.label}</span></label>))}</div>
          </section>
          <section className="opts">
            <div><h5 style={{margin:"0 0 6px",fontSize:11,fontWeight:400,color:"var(--muted)"}}>金額の単位</h5>
              <div className="seg"><label className="radio"><input type="radio" name="u" checked={unit==="yen"} onChange={()=>setUnit("yen")} />円</label><label className="radio"><input type="radio" name="u" checked={unit==="man"} onChange={()=>setUnit("man")} />万円</label></div>
            </div>
            <label className="chk"><input type="checkbox" checked={totalRow} onChange={()=>setTotalRow(v=>!v)} /><span>合計行を追加</span></label>
          </section>
        </div>
        <div className="modal-foot">
          <span className="foot-info">該当 <b>{rows.length}</b> 件{outCols.length===0&&<span className="warn">列を1つ以上選択</span>}</span>
          <div className="foot-btns"><button className="btn btn-ghost" onClick={onClose}>キャンセル</button><button className="btn btn-excel" disabled={!rows.length||!outCols.length} onClick={run}>⬇ Excelで出力</button></div>
        </div>
      </div>
    </div>
  );
}

function ProjectTable({fmt,data,search}){
  const cols=META[fmt].cols;
  const rows=useMemo(()=>{const q=search.trim();return q?data.filter(r=>(r.name+r.client+r.salesRep).includes(q)):data;},[data,search]);
  return (
    <div className="card">
      <div className="tablewrap"><table>
        <thead><tr>{cols.map(c=><th key={c.key}>{c.label}</th>)}</tr></thead>
        <tbody>{rows.map(r=>(
          <tr key={r.id}>{cols.map(c=>{
            if(c.key==="status")return <td key={c.key}><span className={"badge "+badgeClass(r.status)}>{r.status}</span>{r._new&&<span className="new-flag">NEW</span>}</td>;
            if(c.money)return <td key={c.key} className="num">{yen(r[c.key])}</td>;
            if(c.key==="name")return <td key={c.key} className="name" title={r.name}>{r.name}</td>;
            if(c.key==="memo")return <td key={c.key} className="memo" title={r.memo}>{r.memo}</td>;
            return <td key={c.key}>{r[c.key]}</td>;
          })}</tr>
        ))}</tbody>
      </table></div>
      <div className="count">{rows.length} 件 / 全 {data.length} 件</div>
    </div>
  );
}

  return (
    <>
      <div className="tabs">{Object.entries(META).map(([k,v])=>(<button key={k} className={"tab"+(fmt===k?" active":"")} onClick={()=>setFmt(k)}>{v.label}</button>))}</div>
      <div className="toolbar">
        <div className="search"><span style={{color:"var(--muted)"}}>🔍</span><input placeholder="現場名・発注者・担当者で検索" value={search} onChange={e=>setSearch(e.target.value)} /></div>
        <div className="spacer"></div>
        <button className="btn btn-excel" onClick={()=>setShowExport(true)}>⬇ Excelで出力</button>
        <button className="btn btn-primary" onClick={onNew}>＋ 新規案件</button>
      </div>
      <ProjectTable fmt={fmt} data={store[fmt]} search={search} />
      {showExport&&<ExportModal fmt={fmt} data={store[fmt]} onClose={()=>setShowExport(false)} />}
    </>
  );
}

/* ===== 新規登録フォーム（B：CraftBank寄せ） ===== */
function RadioGroup({name,value,onChange,options}){
  return <div className="radios">{options.map(o=>(<label key={o} className={"radio-b"+(value===o?" sel":"")}><input type="radio" name={name} checked={value===o} onChange={()=>onChange(o)} />{o}</label>))}</div>;
}
function FRow({label,req,children}){
  return <div className="frow"><div className="lab">{label}{req===true&&<span className="req">必須</span>}{req===false&&<span className="optf">任意</span>}</div><div className="fld">{children}</div></div>;
}
function NewProjectForm({initialFmt,onSubmit,onCancel}){
  const [fmt,setFmt]=useState(initialFmt);
  const isKoji=fmt==="koji";
  const [f,setF]=useState({status:"営業中",salesRep:"",fieldRep:"",client:"",name:"",kubun:"商社工事",trade:"",amount:"",start:"",end:"",vendor:"",supplier:"",memo:""});
  const [over500,setOver500]=useState(false);
  const set=(k)=>(e)=>setF(p=>({...p,[k]:e.target.value}));
  const submit=()=>{
    if(!f.status||!f.salesRep||!f.client||!f.name){alert("必須項目（ステータス・営業担当者・発注者・現場名）を入力してください");return;}
    const rec={status:f.status,salesRep:f.salesRep,fieldRep:f.fieldRep,client:f.client,name:f.name,trade:f.trade,
      amount:Number(String(f.amount).replace(/[^0-9]/g,""))||0,start:f.start,end:f.end,memo:f.memo,_new:true};
    if(isKoji){rec.kubun=f.kubun;rec.vendor=f.vendor;}else{rec.supplier=f.supplier;}
    onSubmit(fmt,rec);
  };
  return (
    <div>
      <div className="seg2">
        <button className={isKoji?"on":""} onClick={()=>setFmt("koji")}>工事</button>
        <button className={!isKoji?"on":""} onClick={()=>setFmt("zairyo")}>材料</button>
      </div>

      <div className="card">
        <div className="card-h">基本情報</div>
        <div className="form">
          <FRow label="ステータス" req={true}><select className="ctrl half" value={f.status} onChange={set("status")}>{STATUS.map(s=><option key={s}>{s}</option>)}</select></FRow>
          <FRow label="営業担当者" req={true}><select className="ctrl half" value={f.salesRep} onChange={set("salesRep")}><option value=""></option>{SALES.map(s=><option key={s}>{s}</option>)}</select></FRow>
          <FRow label="工事担当者" req={false}><select className="ctrl half" value={f.fieldRep} onChange={set("fieldRep")}><option value=""></option>{FIELDS.map(s=><option key={s}>{s}</option>)}</select></FRow>
          <FRow label="発注者" req={true}><input className="ctrl" value={f.client} onChange={set("client")} placeholder="顧客/外注を選択 または 新規作成" /><span className="hint">＋ 新しい顧客/外注などを作成</span></FRow>
          <FRow label="現場名" req={true}><input className="ctrl" value={f.name} onChange={set("name")} placeholder="現場名" /></FRow>
          {isKoji&&<FRow label="受注区分" req={true}><RadioGroup name="kubun" value={f.kubun} onChange={v=>setF(p=>({...p,kubun:v}))} options={KUBUN} /></FRow>}
          <FRow label="工種" req={false}><select className="ctrl half" value={f.trade} onChange={set("trade")}><option value=""></option>{(isKoji?TRADE_KOJI:TRADE_ZAI).map(t=><option key={t}>{t}</option>)}</select></FRow>
          <FRow label="金額区分" req={false}><label className="check"><input type="checkbox" checked={over500} onChange={e=>setOver500(e.target.checked)} />500万以上</label><span className="hint">チェックすると詳細項目（指名番号・住所など）が入力対象になります</span></FRow>
          <FRow label="見積金額" req={false}><div className="suffix"><input className="ctrl short" value={f.amount} onChange={set("amount")} placeholder="0" /><span className="u">円（税抜）</span></div></FRow>
          <FRow label={isKoji?"施工期間":"納入時期"} req={false}><div className="range"><input className="ctrl short" type="date" value={f.start} onChange={set("start")} /><span>〜</span><input className="ctrl short" type="date" value={f.end} onChange={set("end")} /></div></FRow>
          {isKoji
            ? <FRow label="施工予定業者" req={false}><input className="ctrl half" value={f.vendor} onChange={set("vendor")} placeholder="施工予定業者" /></FRow>
            : <FRow label="仕入業者" req={false}><select className="ctrl half" value={f.supplier} onChange={set("supplier")}><option value=""></option>{SUPPLIER.map(s=><option key={s}>{s}</option>)}</select></FRow>}
          <FRow label="打合せ事項" req={false}><textarea className="ctrl" value={f.memo} onChange={set("memo")} placeholder="打合せ事項"></textarea></FRow>
        </div>
      </div>

      <div className="card" style={{opacity:over500?1:.5}}>
        <div className="card-h">詳細情報{!over500&&"（500万以上の案件のみ入力）"}</div>
        <div className="form">
          <FRow label="指名番号" req={false}><input className="ctrl short" placeholder="指名番号" disabled={!over500} /><span className="hint">※区分名称が自動で入力されます</span></FRow>
          <FRow label="郵便番号" req={false}><input className="ctrl short" placeholder="000-0000" disabled={!over500} /><span className="hint">市区町村が自動で入力されます</span></FRow>
          <FRow label="都道府県" req={false}><select className="ctrl half" disabled={!over500}><option value=""></option><option>静岡県</option><option>愛知県</option></select></FRow>
          <FRow label="市区町村" req={false}><input className="ctrl half" placeholder="市区町村" disabled={!over500} /></FRow>
          <FRow label="その他住所" req={false}><input className="ctrl" placeholder="その他住所" disabled={!over500} /></FRow>
          <FRow label="座標" req={false}><input className="ctrl half" placeholder="緯度, 経度" disabled={!over500} /></FRow>
          <FRow label="備考" req={false}><textarea className="ctrl" placeholder="備考" disabled={!over500}></textarea></FRow>
        </div>
      </div>

      <div className="card">
        <div className="card-h">カレンダー連携</div>
        <div className="form">
          <FRow label="スケジュール" req={false}><input className="ctrl" placeholder="スケジュールタイトル" /></FRow>
          <FRow label="期間/終日" req={false}><div className="radios"><label className="radio-b sel"><input type="radio" name="cal" defaultChecked />期間指定</label><label className="radio-b"><input type="radio" name="cal" />終日</label></div></FRow>
          <FRow label="担当者割当" req={false}><input className="ctrl half" placeholder="スケジュール担当者" /></FRow>
          <FRow label="必要人数" req={false}><div className="radios"><label className="radio-b sel"><input type="radio" name="ninzu" defaultChecked />最小〜最大で指定</label><label className="radio-b"><input type="radio" name="ninzu" />人数を指定</label></div></FRow>
        </div>
        <div className="cal-note">📅 ＋ スケジュールを追加（複数登録可）</div>
      </div>

      <div className="foot-r">
        <button className="btn btn-lg btn-ghost" onClick={onCancel}>キャンセル</button>
        <button className="btn btn-lg btn-save" onClick={submit}>登録する</button>
      </div>
    </div>
  );
}

/* ===== シェル ===== */
function App(){
  const [view,setView]=useState("list");
  const [fmt,setFmt]=useState("koji");
  const [store,setStore]=useState({koji:KOJI,zairyo:ZAIRYO});

  const addRecord=(targetFmt,rec)=>{
    setStore(prev=>{
      const list=prev[targetFmt];
      const id=Math.max(0,...list.map(r=>r.id||0))+1;
      return {...prev,[targetFmt]:[{...rec,id},...list]};
    });
    setFmt(targetFmt);
    setView("list");
  };

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="brand"><div className="logo">丸</div><div><div className="tt">現場管理</div><div className="ss">丸紅 土木部</div></div></div>
        <nav className="nav">
          <button className="side-item active"><span className="dot"></span>案件管理</button>
          <button className="side-item soon"><span className="dot"></span>日報・勤怠<span className="tag">準備中</span></button>
          <button className="side-item soon"><span className="dot"></span>日報フォーマット出力<span className="tag">準備中</span></button>
        </nav>
        <div className="side-foot"><div className="avatar">玲</div>池田 玲</div>
      </aside>
      <div className="main">
        <div className="topbar">
          <h1>{view==="list"?"案件管理":"新規案件登録"}</h1>
          {view==="list"
            ? <span className="crumb">2026年6月</span>
            : <span className="crumb"><a onClick={()=>setView("list")}>案件管理</a> ＞ 新規案件作成</span>}
        </div>
        <div className={"content"+(view==="new"?" narrow":"")}>
          {view==="list"
            ? <ListView store={store} fmt={fmt} setFmt={setFmt} onNew={()=>setView("new")} />
            : <NewProjectForm initialFmt={fmt} onSubmit={addRecord} onCancel={()=>setView("list")} />}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
